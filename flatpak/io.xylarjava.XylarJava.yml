id: io.xylarjava.XylarJava
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17

command: XylarJava
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=all
  - --share=network
  - --socket=pulseaudio
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --filesystem=xdg-download:ro
  - --filesystem=~/.ftba:ro
  - --filesystem=/sys/kernel/mm/hugepages:ro
  - --filesystem=/sys/kernel/mm/transparent_hugepage:ro

modules:
  - cmark.yml
  - tomlplusplus.yml

  - name: XylarJava
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DLauncher_BUILD_PLATFORM=flatpak
      - -DLauncher_ENABLE_JAVA_DOWNLOADER=ON
      - -DLauncher_MSA_CLIENT_ID=273f0e9f-05a2-4132-9a03-7dd3e69057d4
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DLauncher_BUILD_UPDATER=OFF
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        JAVA_COMPILER: /usr/lib/sdk/openjdk17/jvm/openjdk-17/bin/javac
    post-install:
      # Ship bundled community themes next to the binary
      - |
        if [ -d ../community_themes ]; then
          install -d /app/bin/themes
          cp -a ../community_themes/. /app/bin/themes/
        fi
      - |
        if [ -f ../auth-settings.ini.example ]; then
          install -Dm644 ../auth-settings.ini.example /app/bin/auth-settings.ini.example
        fi
    sources:
      - type: git
        url: https://github.com/mrmariixx/XylarJava.git
        branch: main

  - name: gamemode
    buildsystem: meson
    config-opts:
      - -Dwith-sd-bus-provider=no-daemon
      - -Dwith-examples=false
    post-install:
      - install -Dm755 ../data/gamemoderun -t /app/bin
    sources:
      - type: archive
        dest-filename: gamemode.tar.gz
        url: https://api.github.com/repos/FeralInteractive/gamemode/tarball/1.8.2
        sha256: 2886d4ce543c78bd2a364316d5e7fd59ef06b71de63f896b37c6d3dc97658f60
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/libgamemodeauto.a
